services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      # Mount the dataset read-only so the service loads it on startup.
      - ./flights.json:/flights.json:ro
    environment:
      - SKYPATH_DATA_FILE=/flights.json

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      # Browser-side calls go to the host-published backend port.
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend
